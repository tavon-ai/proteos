# A2 Configuration
# Generated by: a2 add
# Profile: api
# Target: poc
#
# Run checks with: a2 check --profile api --target poc

language:
  explicit: [go, typescript]
  go:
    coverage_threshold: 40
    source_dir:
      - ./controlplane
      - ./nodeagent
      - ./guestagent

  typescript:
    source_dir: ./web
    coverage_threshold: 40

files:
  required:
    - README.md

checks:
  disabled:
    - common:k8s
    - common:tracing
    - common:license
    - common:integration
    - common:e2e
    - common:errors
    - common:config_validation
    - common:retry
    - common:api_docs
    - "security:*"
    - common:dockerfile
    - devops:terraform
    - devops:k8s
    - common:changelog
    - common:contributing
    - common:duplication
    - common:naming
    - go:deps_freshness
    - go:cyclomatic
  typescript:
    disabled:
      - common:metrics
  go:
    source_dir:
      - ./nodeagent
      - ./guestagent
    disabled:
      - common:metrics
