document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"c6d2e3fc-9359-47e4-b9f6-6ff655ae1188\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"design_doc_mode\" content=\"canvas\">\n<style>\n@keyframes scBlink { 0%,49%{opacity:1} 50%,100%{opacity:0} }\n@keyframes scSpin { to { transform: rotate(360deg); } }\nbody { margin:0; background:#0a0d12; }\n.rd { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }\n.rd *, .rd *::before, .rd *::after { box-sizing:border-box; }\n.mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }\n.tbtn:hover { background:#161b22 !important; border-color:#30363d !important; }\n.segbtn:hover { background:rgba(255,255,255,.06) !important; color:#e6edf3 !important; }\n.railbtn:hover { background:rgba(255,255,255,.05) !important; color:#e6edf3 !important; }\n.railbtn:hover .rail-tip { opacity:1 !important; transform:translateX(0) !important; }\n.pcmd:hover { background:rgba(47,129,247,.10) !important; }\n.mrow:hover { background:#12161d !important; }\n.filerow:hover { background:rgba(255,255,255,.03) !important; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<section class=\"rd\" style=\"min-width:100%;padding:40px 44px 80px;color:#e6edf3;display:flex;flex-direction:column;gap:8px;\">\n\n  <!-- ===== INTRO ===== -->\n  <div style=\"max-width:820px;display:flex;flex-direction:column;gap:14px;margin-bottom:20px;\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <div style=\"width:30px;height:30px;border-radius:8px;background:linear-gradient(150deg,#2f81f7,#0e7490);display:grid;place-items:center;box-shadow:0 2px 10px rgba(47,129,247,.4);\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 14c3-3 6-3 9 0s6 3 9 0M3 8c3-3 6-3 9 0s6 3 9 0\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <h1 style=\"margin:0;font-size:26px;font-weight:700;letter-spacing:-.02em;\">ProteOS — UI redesign explorations<\u002Fh1>\n    <\u002Fdiv>\n    <p style=\"margin:0;font-size:15px;line-height:1.6;color:#8b949e;\">\n      Three moves against today's pain points: the top bar's plain-text launchers, inconsistent window sizing &amp; margins,\n      and the missing mobile surface. Two contrasting directions for the desktop nav (<a href=\"#1a\" style=\"color:#2f81f7;text-decoration:none;\">1a<\u002Fa> command-bar, <a href=\"#1b\" style=\"color:#2f81f7;text-decoration:none;\">1b<\u002Fa> left rail),\n      plus a purpose-built mobile UI (<a href=\"#1c\" style=\"color:#2f81f7;text-decoration:none;\">1c<\u002Fa>) tuned for the Telegram → phone → review-PR flow. Same GitHub-dark palette throughout. Click the command bar in 1a and the mobile tabs in 1c.\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ============================================================= -->\n  <!-- OPTION 1A -->\n  <!-- ============================================================= -->\n  <div id=\"1a\" style=\"display:flex;flex-direction:column;gap:16px;\">\n    <div style=\"display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;\">\n      <span style=\"display:inline-flex;align-items:center;height:26px;padding:0 11px;border-radius:999px;background:#2f81f7;color:#fff;font-size:13px;font-weight:700;letter-spacing:.02em;\">1a<\u002Fspan>\n      <h2 style=\"margin:0;font-size:20px;font-weight:700;\">Command bar + compact toolbar<\u002Fh2>\n      <span style=\"font-size:14px;color:#8b949e;\">Launchers become a grouped icon toolbar; a ⌘K command bar carries discovery; destructive machine actions move into the machine menu.<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;\">\n      <!-- DESKTOP MOCK A -->\n      <div style=\"flex:0 0 auto;width:1360px;height:840px;border-radius:14px;overflow:hidden;position:relative;border:1px solid #21262d;box-sha e><circle cx=\"17\" cy=\"9\" r=\"2.4\" stroke=\"{{ reviewIcon }}\" stroke-width=\"1.8\"><\u002Fcircle><path d=\"M7 8.4v7.2M9.2 6C14 6 14.6 8 14.6 11.5\" stroke=\"{{ reviewIcon }}\" stroke-width=\"1.8\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-size:10.5px;font-weight:600;color:{{ reviewIcon }};\">Review<\u002Fspan>\n            <\u002Fbutton>\n            <button style=\"display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font:inherit;width:88px;\">\n              <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 12h4l2 6 4-12 2 6h6\" stroke=\"#6b7480\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-size:10.5px;font-weight:600;color:#6b7480;\">Activity<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- NOTES C -->\n      <div style=\"flex:0 0 auto;width:320px;display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#6b7480;\">Why purpose-built, not responsive<\u002Fdiv>\n        <div style=\"display:flex;gap:11px;\"><span style=\"flex:0 0 22px;height:22px;border-radius:6px;background:#1c2230;border:1px solid #30363d;display:grid;place-items:center;font-size:12px;font-weight:700;color:#3fb950;\">1<\u002Fspan><div style=\"font-size:13.5px;line-height:1.55;color:#c9d1d9;\">A draggable multi-window desktop has <b>no honest responsive form<\u002Fb> on a 390px screen. Squeezing it yields tap-targets under 44px and hidden windows.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;\"><span style=\"flex:0 0 22px;height:22px;border-radius:6px;background:#1c2230;border:1px solid #30363d;display:grid;place-items:center;font-size:12px;font-weight:700;color:#3fb950;\">2<\u002Fspan><div style=\"font-size:13.5px;line-height:1.55;color:#c9d1d9;\">The mobile job is <b>narrow &amp; known<\u002Fb>: a Telegram deep-link drops you straight on the PR — skim files, read the diff, <b>Approve &amp; merge<\u002Fb>. One primary action, thumb-reachable.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;\"><span style=\"flex:0 0 22px;height:22px;border-radius:6px;background:#1c2230;border:1px solid #30363d;display:grid;place-items:center;font-size:12px;font-weight:700;color:#3fb950;\">3<\u002Fspan><div style=\"font-size:13.5px;line-height:1.55;color:#c9d1d9;\"><b>Machines<\u002Fb> tab covers the other need — status at a glance, start/stop with a 44px control. No terminals, no editor, no window chrome.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;\"><span style=\"flex:0 0 22px;height:22px;border-radius:6px;background:#1c2230;border:1px solid #30363d;display:grid;place-items:center;font-size:12px;font-weight:700;color:#3fb950;\">4<\u002Fspan><div style=\"font-size:13.5px;line-height:1.55;color:#c9d1d9;\">Shares tokens + the tab model with desktop <a href=\"#1b\" style=\"color:#2f81f7;text-decoration:none;\">1b<\u002Fa>, so it reads as the same product — built once, not maintained as a fork.<\u002Fdiv><\u002Fdiv>\n        <div style=\"margin-top:6px;padding:12px 13px;border-radius:10px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.3);font-size:12.5px;line-height:1.5;color:#c9d1d9;\"><b style=\"color:#3fb950;\">Tap the tabs<\u002Fb> — Machines ↔ Review — to move between the two mobile surfaces.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { mobileScreen: 'review', paletteOpen: false };\n  renderVals() {\n    const s = this.state;\n    const active = '#e6edf3';\n    const idle = '#6b7480';\n    return {\n      isReview: s.mobileScreen === 'review',\n      isMachines: s.mobileScreen === 'machines',\n      paletteOpen: s.paletteOpen,\n      reviewIcon: s.mobileScreen === 'review' ? active : idle,\n      machinesIcon: s.mobileScreen === 'machines' ? active : idle,\n      openPalette: () => this.setState({ paletteOpen: true }),\n      closePalette: () => this.setState({ paletteOpen: false }),\n      stop: (e) => { e.stopPropagation(); },\n      showReview: () => this.setState({ mobileScreen: 'review' }),\n      showMachines: () => this.setState({ mobileScreen: 'machines' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
