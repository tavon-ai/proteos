name: CLI Release

# Build the proteos CLI binary for every supported platform, stamp the chosen
# version into it, and publish a GitHub release with the binaries (plus
# checksums) attached.
#
# Triggered either by pushing a tag matching v* (e.g., v1.2.3) or manually via
# workflow_dispatch (useful for pre-releases and hotfixes from a branch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: build + publish CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: cli/go.mod
          # The CLI module has no external deps (no go.sum); key the module
          # cache off the workspace sum so setup-go doesn't error on a missing
          # cli/go.sum.
          cache-dependency-path: go.work.sum

      - name: Determine version
        id: version
        env:
          # Tag push → use the tag name; manual dispatch → use the input.
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: |
          if [[ -z "$VERSION" ]]; then
            echo "::error::version is empty – cannot release"
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version '$VERSION' must look like v1.2.3 (optionally with a -suffix)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=${VERSION} commit=${COMMIT} date=${DATE}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            out="dist/proteos-${GOOS}-${GOARCH}"
            echo "building $out"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
                -o "$out" ./cmd/proteos
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum proteos-* > checksums.txt
          cat checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          # Empty on tag pushes (no inputs) and when the box is unchecked.
          PRERELEASE_FLAG: ${{ inputs.prerelease == true && '--prerelease' || '' }}
        run: |
          if [[ -z "$VERSION" ]]; then
            echo "::error::resolved version is empty – refusing to create a release"
            exit 1
          fi
          gh release create "$VERSION" \
            --title "proteos CLI $VERSION" \
            --generate-notes \
            --target "${{ github.sha }}" \
            $PRERELEASE_FLAG \
            dist/proteos-* dist/checksums.txt
