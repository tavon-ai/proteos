name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

# Phase 1 CI: every PR builds + tests the Go control plane (with a real Postgres
# service container and migrations applied), checks sqlc drift, and typechecks +
# builds the web app. CI is green from this phase on; later phases land through it.
jobs:
  controlplane:
    name: control plane (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controlplane
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: proteos
          POSTGRES_PASSWORD: proteos
          POSTGRES_DB: proteos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proteos -d proteos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://proteos:proteos@localhost:5432/proteos?sslmode=disable
      TEST_DATABASE_URL: postgres://proteos:proteos@localhost:5432/proteos?sslmode=disable
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: controlplane/go.mod
          cache-dependency-path: controlplane/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: "1.31.1"

      - name: sqlc drift check
        run: sqlc diff

      - name: Apply migrations (against service Postgres)
        run: go run ./cmd/controlplane -migrate-only

      # -p 1 serializes package test binaries: in CI every package shares the
      # single service Postgres, and the down/up migration test mutates global
      # schema. (Locally, Testcontainers gives each package its own DB, so
      # `go test ./...` runs fully parallel there.)
      - name: go test -race
        run: go test -race -p 1 ./...

  nodeagent:
    name: node-agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodeagent
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: nodeagent/go.mod
          # The node-agent has no external deps (no go.sum); key the module
          # cache off the workspace sum so setup-go doesn't error on a missing
          # nodeagent/go.sum.
          cache-dependency-path: go.work.sum

      # The node-agent module builds and tests with no Postgres and no KVM: the
      # dev driver is the default, and the firecracker driver is behind a build
      # tag (exercised only by the self-hosted KVM job below).
      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test -race ./...

  guestagent:
    name: guest agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guestagent
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: guestagent/go.mod
          cache-dependency-path: guestagent/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # The vsock listener is behind a linux build tag; cross-build it so the
      # production (in-VM) target is checked even though the runner is linux.
      - name: go build (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build ./...

      - name: go test -race
        run: go test -race ./...

  # Firecracker integration tests run the real jailed VMM and need KVM, so they
  # only run on a self-hosted runner with the [self-hosted, linux, kvm] labels.
  # The runner must have firecracker+jailer installed and the pinned kernel/rootfs
  # exported via the PROTEOS_TEST_* env below. If no matching runner is registered,
  # the job queues until one becomes available.
  firecracker:
    name: firecracker driver (KVM)
    runs-on: [self-hosted, linux, kvm]
    defaults:
      run:
        working-directory: nodeagent
    env:
      PROTEOS_TEST_KERNEL: ${{ vars.PROTEOS_TEST_KERNEL }}
      PROTEOS_TEST_ROOTFS: ${{ vars.PROTEOS_TEST_ROOTFS }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: nodeagent/go.mod
          cache-dependency-path: go.work.sum

      - name: go build (firecracker tag)
        run: go build -tags=firecracker ./...

      # Root is required for the jailer + tap/nftables setup; the self-hosted
      # runner is configured to allow sudo -E for the test step.
      - name: go test (firecracker integration)
        run: sudo -E env "PATH=$PATH" go test -tags=firecracker ./internal/driver/firecracker/...

  web:
    name: web (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  # govulncheck scans the Go modules for known CVEs. govulncheck is module-scoped
  # (it needs a go.mod in the working directory — the workspace root has only a
  # go.work, hence the per-module matrix). cli and nodeagent have no external deps,
  # so their scans are effectively no-ops but keep coverage honest as deps are added.
  govulncheck:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module: [controlplane, guestagent, nodeagent, cli]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: go.work.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        run: govulncheck ./...

  # CodeQL static analysis for Go (all workspace modules) and TypeScript (web/).
  # Requires security-events: write to upload SARIF results to the Security tab.
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [go, typescript]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: controlplane/go.mod
          cache-dependency-path: go.work.sum

      - name: Set up Node
        if: matrix.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        if: matrix.language == 'typescript'
        run: npm ci
        working-directory: web

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # Build + push the two app-stack images to GHCR, but ONLY after the Go and web
  # jobs above pass (`needs`) and ONLY on push events (`if`) — never on PRs, so
  # forks/PRs can't publish. Pushes to main publish `latest`; v* tag pushes
  # publish semver tags. The firecracker job is intentionally NOT a dependency:
  # it requires a self-hosted KVM runner and may not be available in every environment.
  #
  # Both Dockerfiles take the REPO ROOT as their build context — the control
  # plane links sibling Go-workspace modules, and the web image needs both web/
  # and deploy/app-stack/nginx.conf — so `context: .` is required, not the
  # Dockerfile's directory.
  publish:
    name: publish ${{ matrix.image }}
    needs: [controlplane, nodeagent, guestagent, web]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR via GITHUB_TOKEN
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: proteos-api
            dockerfile: deploy/app-stack/controlplane.Dockerfile
          - image: proteos-ui
            dockerfile: deploy/app-stack/web.Dockerfile
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: `latest` on the default branch, the short+long commit SHA always,
      # and semver tags (1.2.3 / 1.2) when the push is a v* git tag.
      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/tavon-ai/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
