name: CI

on:
  push:
    branches: [main]
  pull_request:

# Phase 1 CI: every PR builds + tests the Go control plane (with a real Postgres
# service container and migrations applied), checks sqlc drift, and typechecks +
# builds the web app. CI is green from this phase on; later phases land through it.
jobs:
  controlplane:
    name: control plane (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controlplane
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: proteos
          POSTGRES_PASSWORD: proteos
          POSTGRES_DB: proteos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proteos -d proteos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://proteos:proteos@localhost:5432/proteos?sslmode=disable
      TEST_DATABASE_URL: postgres://proteos:proteos@localhost:5432/proteos?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: controlplane/go.mod
          cache-dependency-path: controlplane/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.31.1"

      - name: sqlc drift check
        run: sqlc diff

      - name: Apply migrations (against service Postgres)
        run: go run ./cmd/controlplane -migrate-only

      # -p 1 serializes package test binaries: in CI every package shares the
      # single service Postgres, and the down/up migration test mutates global
      # schema. (Locally, Testcontainers gives each package its own DB, so
      # `go test ./...` runs fully parallel there.)
      - name: go test -race
        run: go test -race -p 1 ./...

  nodeagent:
    name: node-agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodeagent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: nodeagent/go.mod
          # The node-agent has no external deps (no go.sum); key the module
          # cache off the workspace sum so setup-go doesn't error on a missing
          # nodeagent/go.sum.
          cache-dependency-path: go.work.sum

      # The node-agent module builds and tests with no Postgres and no KVM: the
      # dev driver is the default, and the firecracker driver is behind a build
      # tag (exercised only by the gated KVM job below).
      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test -race ./...

  guestagent:
    name: guest agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guestagent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: guestagent/go.mod
          cache-dependency-path: guestagent/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # The vsock listener is behind a linux build tag; cross-build it so the
      # production (in-VM) target is checked even though the runner is linux.
      - name: go build (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build ./...

      - name: go test -race
        run: go test -race ./...

  # Firecracker integration tests run the real jailed VMM and need KVM, so they
  # only run on a self-hosted runner with the [self-hosted, linux, kvm] labels.
  # The job is gated on the repo/org variable HAS_KVM_RUNNER so CI stays green
  # until that runner exists; flip the variable to 'true' once it is online
  # (Task 2.8 acceptance). The runner must have firecracker+jailer installed and
  # the pinned kernel/rootfs exported via the PROTEOS_TEST_* env below.
  firecracker:
    name: firecracker driver (KVM)
    if: vars.HAS_KVM_RUNNER == 'true'
    runs-on: [self-hosted, linux, kvm]
    defaults:
      run:
        working-directory: nodeagent
    env:
      PROTEOS_TEST_KERNEL: ${{ vars.PROTEOS_TEST_KERNEL }}
      PROTEOS_TEST_ROOTFS: ${{ vars.PROTEOS_TEST_ROOTFS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: nodeagent/go.mod
          cache-dependency-path: go.work.sum

      - name: go build (firecracker tag)
        run: go build -tags=firecracker ./...

      # Root is required for the jailer + tap/nftables setup; the self-hosted
      # runner is configured to allow sudo -E for the test step.
      - name: go test (firecracker integration)
        run: sudo -E env "PATH=$PATH" go test -tags=firecracker ./internal/driver/firecracker/...

  web:
    name: web (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
