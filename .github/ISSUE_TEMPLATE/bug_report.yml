name: Bug report
description: Report a problem with ProteOS
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! For suspected **security vulnerabilities**, do
        not open a public issue — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - control plane
        - node-agent
        - guest-agent
        - CLI (proteos)
        - web (desktop)
        - deploy / ops
        - not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: ProteOS version/commit, OS, driver (dev vs firecracker), deployment (local vs Proxmox).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs or output. Redact any secrets, tokens, or real host IPs.
      render: shell
