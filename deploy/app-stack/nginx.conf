# nginx serves the SPA and reverse-proxies /api to the control plane, giving the
# browser a single origin (so the session cookie + CSRF header behave exactly as
# in `vite dev`). `controlplane` resolves via the compose network.

# Map the client's Connection header to the value we forward upstream: "upgrade"
# for a WebSocket handshake, "" (drop keep-alive) for everything else.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# Forward the ORIGINAL scheme. TLS is terminated one hop up (NPMplus), which
# proxies to this nginx over plain HTTP — so $scheme here is "http". Using
# $scheme for X-Forwarded-Proto would tell the control plane the request was
# insecure and it would mint http:// editor URLs (mixed-content blocked under
# the https dashboard). Instead honour the X-Forwarded-Proto NPMplus sets, and
# fall back to $scheme only for a direct (no-upstream-proxy) hit.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Terminal WebSocket gateway. Must carry the Upgrade/Connection headers so
    # the GET /gw/terminal handshake reaches the control plane as a real upgrade
    # (otherwise it falls through to the SPA and returns index.html with 200).
    location /gw/ {
        proxy_pass http://controlplane:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-lived terminal: don't buffer, don't time out an idle session.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # API + auth + SSE. proxy_pass without a path preserves the /api/ prefix.
    location /api/ {
        proxy_pass http://controlplane:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # GET /api/machine/events is Server-Sent Events: never buffer, hold the
        # connection open, and drop the keep-alive Connection header.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }
}

# Phase 8 + PP1: per-machine code-server editor origin (m-<uuid>.<DOMAIN>) and
# the port-preview origin (m-<uuid>-p<port>.<DOMAIN>). This regex server_name is
# MORE specific than `server_name _` above, so any `m-<uuid>…` Host routes here
# instead of getting the SPA's index.html (the exact silent-failure class the
# /gw/ gotcha documents — see RUNBOOK.md). Every path is proxied unchanged to the
# control plane, which host-routes the subdomain to its machine-web handler. TLS +
# the wildcard DNS record live at the proxy layer (NPMplus) — see DEPLOYMENT.md;
# this block is plain HTTP behind it.
server {
    listen 80;
    # Match the machine label by shape (m-<uuid>, with an optional -p<port> preview
    # suffix), independent of the domain suffix the wildcard cert covers. The
    # control plane re-validates the full host against PROTEOS_MACHINE_DOMAIN and
    # the port range, so a loose match here is safe.
    server_name "~^m-[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}(-p[0-9]{1,5})?\.";

    # Proxy EVERYTHING (auth handoff, the editor, code-server's WebSockets) to the
    # control plane. No SPA fallback here — this origin must never serve index.html
    # or the API; the control plane enforces that split by Host.
    location / {
        proxy_pass http://controlplane:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # code-server is WebSocket-heavy and long-lived: carry Upgrade/Connection,
        # don't buffer, don't time out idle editors (the /gw/ lesson).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
