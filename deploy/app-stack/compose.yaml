# ProteOS app stack: Postgres + control plane + web (SPA behind nginx).
# Runs on the app VM; dials the native node-agent on the KVM host over the LAN.
#
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d --build
#   # browse to $PROTEOS_BASE_URL and sign in with GitHub
#
# The node-agent is NOT part of this stack — it runs natively on the KVM host
# (see deploy/node-agent/). Set PROTEOS_NODE_AGENT_URL to that host's address.

name: proteos

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proteos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proteos}
      POSTGRES_DB: ${POSTGRES_DB:-proteos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-proteos} -d ${POSTGRES_DB:-proteos}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    ports:
      - 5432:5432

  # OpenBao: the production secrets backend (Phase 5). Single node, file storage,
  # persistent volume. It boots SEALED — after `docker compose up` you must run
  # deploy/app-stack/openbao-init.sh once (init + unseal + policies) and unseal
  # again after every restart. HA + auto-unseal are Phase 12. See RUNBOOK Part D.
  openbao:
    image: openbao/openbao:2.5.1
    cap_add:
      - IPC_LOCK
    command: server
    environment:
      BAO_LOCAL_CONFIG: >-
        {"storage": {"file": {"path": "/openbao/data"}},
         "listener": {"tcp": {"address": "0.0.0.0:8200", "tls_disable": true}},
         "api_addr": "http://openbao:8200", "ui": false}
    volumes:
      - baodata:/openbao/data
      - baologs:/openbao/logs
    # Published so the operator can run `bao` / openbao-init.sh against it.
    # Restrict this port to the operator at the firewall — it is NOT
    # browser-facing and must stay unreachable from VMs (Phase 2 egress
    # default-deny already covers the VM side).
    ports:
      - "8200:8200"
    restart: unless-stopped

  controlplane:
    build:
      context: ../..
      dockerfile: deploy/app-stack/controlplane.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      openbao:
        condition: service_started
    environment:
      PROTEOS_ADDR: ":8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-proteos}:${POSTGRES_PASSWORD:-proteos}@postgres:5432/${POSTGRES_DB:-proteos}?sslmode=disable"

      # Browser-facing origin (the web service below). Must equal the URL you
      # open AND the host+port in the GitHub App's callback URL.
      PROTEOS_BASE_URL: ${PROTEOS_BASE_URL:?set to e.g. http://APP_VM_IP:8080}
      PROTEOS_COOKIE_SECURE: ${PROTEOS_COOKIE_SECURE:-false}

      # Secrets backend. Default "file" so a fresh stack serves before OpenBao is
      # initialized; switch to "openbao" in .env after running openbao-init.sh
      # (which emits PROTEOS_OPENBAO_ROLE_ID + the secret_id file). RUNBOOK Part D.
      PROTEOS_SECRETS_BACKEND: ${PROTEOS_SECRETS_BACKEND:-file}
      PROTEOS_SECRETS_FILE: /var/lib/proteos/secrets.json
      PROTEOS_OPENBAO_ADDR: ${PROTEOS_OPENBAO_ADDR:-http://openbao:8200}
      PROTEOS_OPENBAO_MOUNT: ${PROTEOS_OPENBAO_MOUNT:-secret}
      PROTEOS_OPENBAO_ROLE_ID: ${PROTEOS_OPENBAO_ROLE_ID:-}
      # The AppRole secret_id is read from a file (kept out of the env/process
      # list). Put it at deploy/app-stack/openbao-secret-id (mounted below).
      PROTEOS_OPENBAO_SECRET_ID_FILE: /run/secrets/openbao-secret-id

      # Native node-agent on the KVM host. Token must match the agent's.
      PROTEOS_NODE_AGENT_URL: ${PROTEOS_NODE_AGENT_URL:?set to http://KVM_HOST_IP:9090}
      PROTEOS_AGENT_TOKEN: ${PROTEOS_AGENT_TOKEN:?shared bearer token (must match the node-agent)}
      PROTEOS_HOST_NAME: ${PROTEOS_HOST_NAME:-proxmox-fc-1}

      # Image refs stamped on each machine; must match files staged in the
      # agent's PROTEOS_AGENT_IMAGES_DIR.
      PROTEOS_KERNEL_REF: ${PROTEOS_KERNEL_REF:-vmlinux}
      # With a template catalog set (below), PROTEOS_ROOTFS_REF is only the
      # fallback used to synthesize the "base" template.
      PROTEOS_ROOTFS_REF: ${PROTEOS_ROOTFS_REF:-ubuntu-24.04.ext4}
      PROTEOS_MACHINE_VCPUS: ${PROTEOS_MACHINE_VCPUS:-2}
      PROTEOS_MACHINE_MEM_MIB: ${PROTEOS_MACHINE_MEM_MIB:-2048}
      PROTEOS_MACHINE_DISK_MIB: ${PROTEOS_MACHINE_DISK_MIB:-10240}

      # Machine-template catalog. UNSET (default) ⇒ a single "base" template is
      # synthesized from PROTEOS_ROOTFS_REF, so a fresh stack works before any
      # templates are baked. To offer the full catalog, copy the
      # proteos-templates.json the node_agent Ansible role fetched
      # (deploy/ansible/artifacts/) over the placeholder ./proteos-templates.json
      # (mounted read-only below), then set this to /etc/proteos/templates.json.
      PROTEOS_TEMPLATES_FILE: ${PROTEOS_TEMPLATES_FILE:-}
      # Caps for the per-resource overrides users may request at create time. The
      # floors are fixed (1 vcpu / 1024 MiB / 5120 MiB); every template's defaults
      # must fit within these or the control plane fails startup.
      PROTEOS_MAX_VCPUS: ${PROTEOS_MAX_VCPUS:-8}
      PROTEOS_MAX_MEM_MIB: ${PROTEOS_MAX_MEM_MIB:-16384}
      PROTEOS_MAX_DISK_MIB: ${PROTEOS_MAX_DISK_MIB:-51200}

      # Phase 8: per-machine code-server editor subdomains. Set to the parent
      # domain you point a wildcard DNS record + TLS cert at (e.g.
      # machines.proteos.example); a machine is then served at
      # m-<uuid>.<domain>. UNSET ⇒ the editor + its routes are disabled (the
      # dashboard's "Open editor" still mints but the route 404s). See
      # DEPLOYMENT.md "Wildcard DNS/TLS for the editor".
      PROTEOS_MACHINE_DOMAIN: ${PROTEOS_MACHINE_DOMAIN:-}

      # Phase 6: which provider CLIs the UI may offer — set this to match the
      # providers you baked into the rootfs (the Ansible proteos_<p>_install flags).
      # CSV of provider keys; unset ⇒ leave the registry seeds as-is. Default keeps
      # only Claude (the always-baked Phase 5 CLI); add openai/gemini/pi as you bake
      # them, e.g. PROTEOS_PROVIDERS_ENABLED=claude,openai,pi.
      PROTEOS_PROVIDERS_ENABLED: ${PROTEOS_PROVIDERS_ENABLED:-claude}

      # GitHub OAuth (Phase 1 auth).
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:?}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:?}
      PROTEOS_STATE_KEY: ${PROTEOS_STATE_KEY:?32+ byte random hex}
      ALLOWED_GITHUB_LOGINS: ${ALLOWED_GITHUB_LOGINS:-}
      # GitHub git operations (Phase 7). GITHUB_APP_SLUG builds the "choose repos"
      # link the Repos panel shows (github.com/apps/<slug>). PROTEOS_GIT_HOST is
      # the host clones target + the credential helper mints tokens for; leave it
      # at github.com (overridden only by the e2e harness's local git server).
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      PROTEOS_GIT_HOST: ${PROTEOS_GIT_HOST:-github.com}
    volumes:
      - cpdata:/var/lib/proteos
      # AppRole secret_id, written by openbao-init.sh. Read-only, off the env.
      # The file may not exist until you run the init script; with the default
      # file backend the control plane never reads it.
      - ./openbao-secret-id:/run/secrets/openbao-secret-id:ro
      # Machine-template catalog. The committed placeholder is an empty catalog;
      # replace it with the fetched proteos-templates.json and set
      # PROTEOS_TEMPLATES_FILE=/etc/proteos/templates.json to activate it. Until
      # then PROTEOS_TEMPLATES_FILE is empty and this file is not read.
      - ./proteos-templates.json:/etc/proteos/templates.json:ro
    # If you instead co-locate this stack on the SAME host as the node-agent,
    # set PROTEOS_NODE_AGENT_URL=http://host.docker.internal:9090 and uncomment:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: deploy/app-stack/web.Dockerfile
    depends_on:
      - controlplane
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  pgdata:
  cpdata:
  baodata:
  baologs:
