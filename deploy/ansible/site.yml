---
# Configure a Proxmox KVM host to run the ProteOS node-agent (Firecracker
# driver), fully reproducibly. Mirrors the manual flow in:
#   spike/firecracker/01-host-setup.sh   (packages, fc/jailer, kernel, rootfs)
#   spike/firecracker/prod-setup.sh       (stage artifacts into /var/lib/proteos)
#   deploy/node-agent/setup-service.sh    (build binary + install systemd unit)
#
# Run:  ansible-playbook -i inventory.ini site.yml \
#         --extra-vars "proteos_agent_token=$(openssl rand -hex 32)"
# (better: keep the token in group_vars/all.yml via ansible-vault — see README.)
- name: Configure ProteOS node-agent KVM host
  hosts: proteos_kvm
  become: true
  roles:
    - common       # apt packages (incl. vim), /dev/kvm preflight, IP forwarding, dirs
    # optional (off by default): join the host to a tailnet. Re-run just this on a
    # provisioned node with `--tags tailscale`.
    - role: tailscale
      tags: [tailscale]
    - go           # pinned Go toolchain (to build the node-agent binary) + PATH
    - taskfile     # pinned go-task `task` CLI on PATH
    - firecracker  # pinned firecracker + jailer binaries, kernel, ext4 rootfs
    - node_agent   # source sync, build binary, env file, systemd service
