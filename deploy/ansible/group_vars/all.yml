---
# ============================================================================
# Pinned artifact versions — mirror spike/firecracker/{env.sh,versions.lock}.
# "Fully reproducible" means pinning, not resolving-latest at run time, so the
# kernel object key is fixed here rather than discovered from the CI bucket.
# ============================================================================
proteos_fc_version: "v1.16.0"                                  # firecracker + jailer release tag
proteos_ci_version: "v1.15"                                    # CI artifact bucket line (lags the binary)
proteos_ubuntu_version: "24.04"                                # rootfs flavour from the CI bucket
proteos_kernel_key: "firecracker-ci/v1.15/x86_64/vmlinux-6.1.155"  # exact key from versions.lock
proteos_go_version: "1.26.4"                                   # must satisfy nodeagent/go.mod (go 1.26.4)
proteos_taskfile_version: "v3.40.0"                            # go-task release tag (host `task` CLI; bump freely)
proteos_arch: "x86_64"
proteos_go_arch: "amd64"

proteos_fc_release_url: "https://github.com/firecracker-microvm/firecracker/releases/download"
proteos_ci_bucket: "https://s3.amazonaws.com/spec.ccfc.min"
proteos_go_dl_url: "https://go.dev/dl"
proteos_taskfile_release_url: "https://github.com/go-task/task/releases/download"

# ============================================================================
# Host layout — MUST match deploy/node-agent/.env.example. These are the paths
# the agent's preflight checks and the systemd unit expect.
# ============================================================================
proteos_bin_dir: "/usr/local/bin"
proteos_images_dir: "/var/lib/proteos/images"
proteos_data_dir: "/var/lib/proteos/agent"
proteos_volumes_dir: "/var/lib/proteos/volumes"          # per-machine LUKS volumes (0700, OUTSIDE the jail tree)
proteos_chroot_base_dir: "/srv/jailer"                   # jailer --chroot-base-dir
proteos_src_dir: "/opt/proteos/src"                      # node-agent source checkout
proteos_config_dir: "/etc/proteos"
proteos_env_file: "/etc/proteos/node-agent.env"
proteos_bin_out: "/usr/local/bin/proteos-node-agent"     # built binary (BIN_OUT in run-node-agent.sh)
proteos_go_root: "/usr/local/go"

# Image filenames inside proteos_images_dir.
proteos_kernel_ref: "vmlinux"

# The PLAIN Firecracker-CI ext4 the firecracker role builds. It is only the
# BASE: the node_agent role bakes the guest agent + persist/resume into it via
# image/build-rootfs.sh, producing proteos-rootfs-<base>-ga<sha>.ext4. That baked
# name is what the agent boots; it is derived at bake time and assigned to
# proteos_rootfs_ref (the value below is just the pre-bake fallback).
proteos_base_rootfs_ref: "ubuntu-24.04.ext4"
proteos_rootfs_ref: "ubuntu-24.04.ext4"
proteos_rootfs_size: "1G"

# ----------------------------------------------------------------------------
# Phase 5: bake the Claude Code agent CLI into the rootfs. The providers
# profile.d wiring is baked regardless; this controls the `claude` binary.
#
# proteos_claude_install:
#   "bootstrap" (default) — build-rootfs.sh fetches the official native binary
#       from Anthropic's release endpoint (downloads.claude.ai) and verifies it
#       against the published manifest checksum. proteos_claude_version pins the
#       channel/version ("stable" default, or "latest"/"X.Y.Z"). Needs network on
#       the BAKE HOST (the KVM host); the runtime image stays pinned/offline.
#   "binary" — bake a pre-fetched pinned binary (air-gapped). Provide exactly one
#       of proteos_claude_binary_url / proteos_claude_binary_src, plus
#       proteos_claude_version and (recommended) proteos_claude_sha256.
#   "none" — skip Claude Code (only the providers wiring is baked).
#
# Bumping the version/channel on an already-baked host needs a FORCED rebuild
# (delete {{ proteos_images_dir }}/manifest.lock — see deploy/ansible/README.md),
# since the bake is guarded on source changes, not on these vars.
# ----------------------------------------------------------------------------
proteos_claude_install: "bootstrap"   # bootstrap | binary | none
proteos_claude_version: ""            # bootstrap: channel/version (empty ⇒ stable); binary: required
proteos_claude_sha256: ""             # binary mode: recommended sha256 pin
proteos_claude_binary_url: ""         # binary mode: direct URL to the pinned linux-x64 `claude`
proteos_claude_binary_src: ""         # binary mode: OR a local file on the ansible controller
proteos_claude_staged: "{{ proteos_images_dir }}/claude-staged"  # host staging path (binary mode)

# ----------------------------------------------------------------------------
# Phase 6: bake the remaining provider CLIs (Gemini, OpenAI Codex, pi.dev) into
# the rootfs alongside a Node LTS runtime. Each is OPT-IN (default "none"); enable
# the ones you want by setting its install mode to "latest". When enabled, it
# follows Claude's bootstrap philosophy: install the LATEST version unless the
# matching *_version pins a specific release.
#
# proteos_<provider>_install:
#   "latest" — install the CLI; the latest published version unless the matching
#       *_version pins one. Gemini/Codex/pi.dev are all npm packages, so this
#       needs network on the BAKE HOST (the KVM host), like claude bootstrap.
#   "none" (default) — skip this provider.
#
# Node is the shared runtime for the three npm CLIs; it is installed automatically
# whenever any of them is enabled. proteos_node_version pins it (empty ⇒ latest
# LTS resolved from nodejs.org).
#
# As with Claude, bumping a version/toggle on an already-baked host needs a FORCED
# rebuild (delete {{ proteos_images_dir }}/manifest.lock — see README.md): the
# bake is guarded on source changes, not on these vars.
# ----------------------------------------------------------------------------
proteos_node_version: ""               # empty ⇒ latest LTS (only used when an npm CLI is enabled)
proteos_gemini_install: "none"         # latest | none
proteos_gemini_version: ""             # empty ⇒ latest; set to pin
proteos_codex_install: "none"          # latest | none
proteos_codex_version: ""              # empty ⇒ latest; set to pin
proteos_pi_install: "none"             # latest | none
proteos_pi_version: ""                 # empty ⇒ latest; set to pin

# Phase 7: install git into the guest rootfs (clone/commit/push need a real git
# binary; the ProteOS credential helper is the guestagent binary, wired via
# gitconfig at runtime — nothing secret is baked). On by default; set false only
# for air-gapped builds or a base image that already ships git. When true, the
# node_agent role also runs image/verify-phase7-rootfs.sh as a post-bake gate.
proteos_git_install: true

# ----------------------------------------------------------------------------
# Phase 8: bake the code-server editor into the guest rootfs. The browser editor
# (per-machine subdomain) is served by code-server, which the guest agent lazily
# starts on its web-forward port (vsock:1025). The standalone release bundles its
# own Node, so the bake just fetches + unpacks it (network on the BAKE HOST). On
# by default; set false for air-gapped builds (the web forward then has nothing
# to start). proteos_codeserver_version pins a release (empty ⇒ latest GitHub
# release); proteos_codeserver_sha256 verifies the tarball. When true, the
# node_agent role runs image/verify-phase8-rootfs.sh as a post-bake gate.
#
# Bumping the version on an already-baked host needs a FORCED rebuild (delete
# {{ proteos_images_dir }}/manifest.lock — see README.md): the bake is guarded on
# source changes, not on these vars. The image grows ~400 MiB when enabled.
proteos_codeserver_install: true
proteos_codeserver_version: ""        # empty ⇒ latest GitHub release; set to pin (e.g. 4.99.3)
proteos_codeserver_sha256: ""         # optional sha256 pin for the release tarball

# ----------------------------------------------------------------------------
# Guest dev tooling baked into the rootfs: vim, the Go toolchain (unpacked into
# /usr/local/go and put on PATH), and the Taskfile (`task`) CLI. All on by
# default; set the matching *_install false to skip. Empty Go/Taskfile versions
# fall back to build-rootfs.sh's pinned defaults. Like the other bakes, bumping
# these on an already-baked host needs a FORCED rebuild (delete
# {{ proteos_images_dir }}/manifest.lock — see README): the bake is guarded on
# source changes, not on these vars. Go adds ~600 MiB to the image.
#
# proteos_guest_aliases: shell aliases baked into the guest's interactive shells
# (root + the run-as user), a name⇒command map. Example:
#   proteos_guest_aliases:
#     ll: "ls -alF"
#     gs: "git status"
# (Alias values must not contain a single quote — they are passed as --alias 'k=v'.)
# ----------------------------------------------------------------------------
proteos_guest_vim_install: true
proteos_guest_go_install: true
proteos_guest_go_version: ""           # empty ⇒ build-rootfs.sh default (mirrors the host Go pin)
proteos_guest_taskfile_install: true
proteos_guest_taskfile_version: ""     # empty ⇒ build-rootfs.sh default
proteos_guest_aliases: {}              # name ⇒ command map; baked into the guest .bashrc

# ============================================================================
# node-agent runtime config — rendered into proteos_env_file.
# ============================================================================
proteos_agent_addr: "0.0.0.0:9090"            # 0.0.0.0 so the (separate) app VM can reach it
proteos_agent_driver: "firecracker"
proteos_agent_subnet: "172.30.0.0/24"         # per-host guest subnet; keep off the host/app-VM subnets
proteos_firecracker_bin: "/usr/local/bin/firecracker"
proteos_jailer_bin: "/usr/local/bin/jailer"
proteos_cryptsetup_bin: "/usr/sbin/cryptsetup"

# Optional TLS for the agent channel. Set both to serve HTTPS (Phase 4). The
# control plane pins this cert via PROTEOS_NODE_CA_FILE. Leave empty for plain.
proteos_agent_tls_cert: ""
proteos_agent_tls_key: ""

# Acceptance gate: before a node is allowed to serve, run the firecracker KVM
# integration suite (encrypted hibernate/resume + boot/stop/egress/vsock) against
# the just-baked rootfs. A red gate aborts the play, so a node is never green-lit
# on hardware/config that can't actually run encrypted microVMs. It boots real
# VMs and auto-skips a node already serving machines (IP/tap contention); set
# false (or `--skip-tags acceptance`) to skip on a live node.
proteos_run_acceptance_test: true

# ============================================================================
# REQUIRED: shared bearer token. MUST equal the app stack's PROTEOS_AGENT_TOKEN.
# Do NOT commit a real value here — override via ansible-vault or --extra-vars.
# Generate once: openssl rand -hex 32
# ============================================================================
proteos_agent_token: "CHANGE_ME"

# ============================================================================
# Source of the node-agent code. Default: rsync this repo checkout to the host.
# Set proteos_src_git_repo to a clone URL to use git instead (more reproducible
# for CI; the local rsync is handier while iterating).
# ============================================================================
proteos_src_local: "{{ playbook_dir }}/../.."
proteos_src_git_repo: ""
proteos_src_git_version: "main"

# ============================================================================
# Optional host firewall: restrict the agent port to the app VM only. Off by
# default — the node-agent manages its OWN nftables ruleset for guest taps, so
# we don't touch nftables here to avoid clobbering it. When enabled this adds a
# dedicated nft table that only accepts :9090 from proteos_app_vm_ip.
# ============================================================================
proteos_restrict_agent_port: false
proteos_app_vm_ip: ""
proteos_agent_port: 9090
