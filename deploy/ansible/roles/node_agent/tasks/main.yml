---
# Guard against shipping the placeholder token to a host (it must match the app
# stack, and a real deploy with CHANGE_ME would silently 401 every agent call).
- name: Assert a real agent token was provided
  tags: [outputs]
  ansible.builtin.assert:
    that:
      - proteos_agent_token is defined
      - proteos_agent_token | length > 0
      - proteos_agent_token != "CHANGE_ME"
    fail_msg: >-
      proteos_agent_token is unset/placeholder. Pass a real token (must equal the
      app stack's PROTEOS_AGENT_TOKEN), e.g.
      --extra-vars "proteos_agent_token=$(openssl rand -hex 32)" or via ansible-vault.

# ----------------------------------------------------------------------------
# Source: rsync this checkout (default) or clone from git. The node-agent is a
# self-contained Go module (GOWORK=off, no external deps), so only nodeagent/ and
# deploy/node-agent/ are strictly needed — we sync the repo and let the build
# isolate the module.
# ----------------------------------------------------------------------------
- name: Sync node-agent source from local checkout
  when: proteos_src_git_repo | length == 0
  ansible.posix.synchronize:
    src: "{{ proteos_src_local }}/"
    dest: "{{ proteos_src_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=node_modules"
      - "--exclude=spike/firecracker/work"
      - "--exclude=*.ext4"
      - "--exclude=*.luks"
      # Never ship local .env files: run-node-agent.sh sources ./.env next to
      # itself, which would silently override the Ansible-managed env file (the
      # systemd EnvironmentFile). The host's only env source is proteos_env_file.
      - "--exclude=.env"
      - "--exclude=*.env"
  register: src_sync

# --delete does not remove rsync-excluded paths, so a .env from an earlier sync
# would linger and keep overriding the managed env. Remove it explicitly.
- name: Remove any stale checked-out .env on the host
  ansible.builtin.file:
    path: "{{ proteos_src_dir }}/deploy/node-agent/.env"
    state: absent

- name: Clone node-agent source from git
  when: proteos_src_git_repo | length > 0
  ansible.builtin.git:
    repo: "{{ proteos_src_git_repo }}"
    dest: "{{ proteos_src_dir }}"
    version: "{{ proteos_src_git_version }}"
    force: true
  register: src_git

# ----------------------------------------------------------------------------
# Build the binary up-front (don't rely on the service's lazy build fallback,
# whose PATH may lack Go). Rebuild whenever the source changed or it's missing.
# ----------------------------------------------------------------------------
- name: Check for existing node-agent binary
  ansible.builtin.stat:
    path: "{{ proteos_bin_out }}"
  register: agent_bin

- name: Build node-agent binary
  ansible.builtin.command:
    cmd: "{{ proteos_src_dir }}/deploy/node-agent/run-node-agent.sh build"
  environment:
    PATH: "{{ proteos_go_root }}/bin:{{ ansible_env.PATH }}"
    BIN_OUT: "{{ proteos_bin_out }}"
  register: build_out
  changed_when: true
  when: >-
    (src_sync is defined and src_sync.changed) or
    (src_git is defined and src_git.changed) or
    not agent_bin.stat.exists
  notify: restart node-agent

# ----------------------------------------------------------------------------
# Bake the guest rootfs: install the guest agent (+ persist/resume) and its
# systemd unit into the plain CI base ext4 the firecracker role built. The base
# alone has no guest agent, so guests booted from it would have no terminal or
# persistence. image/build-rootfs.sh emits proteos-rootfs-<base>-ga<sha>.ext4
# plus a manifest.lock we read back to learn the exact name.
# ----------------------------------------------------------------------------
- name: Resolve source git short SHA for the baked image name
  ansible.builtin.command: git -C "{{ proteos_src_local }}" rev-parse --short HEAD
  delegate_to: localhost
  become: false
  run_once: true
  changed_when: false
  failed_when: false
  register: src_git_short
  when: proteos_src_git_repo | length == 0

# Source-change flag: any rootfs rebake is keyed on the source moving (the git
# short SHA is in every image name) or a template's manifest being absent.
- name: Note whether the synced/cloned source changed this run
  ansible.builtin.set_fact:
    proteos_src_changed: >-
      {{ (src_sync is defined and src_sync.changed)
         or (src_git is defined and src_git.changed) }}

# Per-template manifests (manifest-<id>.lock). A template is (re)baked when the
# source changed or its own manifest is missing — so adding a template to the
# catalog bakes just the new one, while a source bump rebakes the whole set.
- name: Check for existing per-template rootfs manifests
  ansible.builtin.stat:
    path: "{{ proteos_images_dir }}/manifest-{{ item.id }}.lock"
  loop: "{{ proteos_templates }}"
  loop_control:
    label: "{{ item.id }}"
  register: tmpl_manifests

# Phase 5: Claude Code bake mode. "bootstrap" (default) lets build-rootfs.sh fetch
# the official binary; "binary" stages a pre-fetched pinned binary here; "none"
# skips it. The providers profile.d wiring is baked regardless.
- name: Phase 5 — validate Claude Code install mode
  ansible.builtin.assert:
    that:
      - proteos_claude_install in ['bootstrap', 'binary', 'none']
    fail_msg: "proteos_claude_install must be one of: bootstrap, binary, none"

- name: Phase 5 — ensure curl is present for the bootstrap fetch
  ansible.builtin.apt:
    name: [curl, ca-certificates]
    state: present
    update_cache: true
  when: proteos_claude_install == 'bootstrap'

- name: Phase 5 — validate binary-mode inputs
  ansible.builtin.assert:
    that:
      - (proteos_claude_binary_url | length > 0) or (proteos_claude_binary_src | length > 0)
      - proteos_claude_version | length > 0
    fail_msg: >-
      proteos_claude_install=binary requires proteos_claude_version AND one of
      proteos_claude_binary_url / proteos_claude_binary_src.
  when: proteos_claude_install == 'binary'

- name: Phase 5 — stage the pinned Claude Code binary (URL)
  ansible.builtin.get_url:
    url: "{{ proteos_claude_binary_url }}"
    dest: "{{ proteos_claude_staged }}"
    mode: "0755"
    checksum: "{{ ('sha256:' + proteos_claude_sha256) if (proteos_claude_sha256 | length > 0) else omit }}"
  when:
    - proteos_claude_install == 'binary'
    - proteos_claude_binary_url | length > 0

- name: Phase 5 — stage the pinned Claude Code binary (local copy)
  ansible.builtin.copy:
    src: "{{ proteos_claude_binary_src }}"
    dest: "{{ proteos_claude_staged }}"
    mode: "0755"
  when:
    - proteos_claude_install == 'binary'
    - proteos_claude_binary_url | length == 0
    - proteos_claude_binary_src | length > 0

# Phase 6: Gemini / OpenAI Codex / pi.dev. Each is "latest" (install, latest
# version) or "none"; an empty *_version installs the latest, a set one pins it.
- name: Phase 6 — validate provider install modes
  ansible.builtin.assert:
    that:
      - proteos_gemini_install in ['latest', 'none']
      - proteos_codex_install in ['latest', 'none']
      - proteos_pi_install in ['latest', 'none']
    fail_msg: "proteos_{gemini,codex,pi}_install must be one of: latest, none"

# True when any npm-distributed provider is enabled — they share the Node runtime
# the bake installs, and the bake host needs network + xz to fetch/unpack it.
- name: Phase 6 — note whether any npm provider CLI is enabled
  ansible.builtin.set_fact:
    proteos_npm_providers: >-
      {{ (proteos_gemini_install == 'latest')
         or (proteos_codex_install == 'latest')
         or (proteos_pi_install == 'latest') }}

- name: Phase 6 — ensure Node/npm bake prerequisites are present
  ansible.builtin.apt:
    name: [curl, ca-certificates, xz-utils]
    state: present
    update_cache: true
  # Needed whenever Node is baked: any npm provider, OR any template with node: true.
  when: >-
    (proteos_npm_providers | bool)
    or (proteos_templates | selectattr('node') | list | length > 0)

- name: Phase 8 — ensure code-server bake prerequisites are present
  ansible.builtin.apt:
    name: [curl, ca-certificates, tar, gzip]
    state: present
    update_cache: true
  when: proteos_codeserver_install | bool

- name: Guest dev tooling — ensure bake prerequisites are present (Go/Taskfile fetch)
  ansible.builtin.apt:
    name: [curl, ca-certificates, tar, gzip]
    state: present
    update_cache: true
  # Taskfile is platform-wide; Go is baked by any template with go: true.
  when: >-
    (proteos_guest_taskfile_install | bool)
    or (proteos_templates | selectattr('go') | list | length > 0)

- name: Guest dev tooling — ensure Bun bake prerequisite is present (zip extraction)
  ansible.builtin.apt:
    name: [unzip]
    state: present
    update_cache: true
  # install_bun unzips the release asset on the host before copying into the image.
  when: proteos_templates | selectattr('bun', 'defined') | selectattr('bun') | list | length > 0

- name: Bake one rootfs image per machine template (guest agent + platform + language layer)
  ansible.builtin.command:
    cmd: >-
      {{ proteos_src_dir }}/image/build-rootfs.sh
      --base {{ proteos_images_dir }}/{{ proteos_base_rootfs_ref }}
      --out-dir {{ proteos_images_dir }}
      --template {{ item.id }}
      {{ '--go' if item.go else '--no-go' }}{% if item.go and proteos_guest_go_version | length > 0 %} --go-version {{ proteos_guest_go_version }}{% endif %}
      {{ '--node' if item.node else '--no-node' }}
      {{ '--python' if item.python else '--no-python' }}
      {{ '--rust' if item.rust | default(false) else '--no-rust' }}
      {{ '--bun' if item.bun | default(false) else '--no-bun' }}
      {% if proteos_claude_install == 'bootstrap' %} --claude-bootstrap{% if proteos_claude_version | length > 0 %} --claude-version {{ proteos_claude_version }}{% endif %}{% elif proteos_claude_install == 'binary' %} --claude-binary {{ proteos_claude_staged }} --claude-version {{ proteos_claude_version }}{% if proteos_claude_sha256 | length > 0 %} --claude-sha256 {{ proteos_claude_sha256 }}{% endif %}{% endif %}
      {% if item.node %}{% if proteos_gemini_install == 'latest' %} --gemini{% if proteos_gemini_version | length > 0 %} --gemini-version {{ proteos_gemini_version }}{% endif %}{% endif %}{% if proteos_codex_install == 'latest' %} --codex{% if proteos_codex_version | length > 0 %} --codex-version {{ proteos_codex_version }}{% endif %}{% endif %}{% if proteos_pi_install == 'latest' %} --pi{% if proteos_pi_version | length > 0 %} --pi-version {{ proteos_pi_version }}{% endif %}{% endif %}{% if proteos_node_version | length > 0 %} --node-version {{ proteos_node_version }}{% endif %}{% endif %}
      {% if not (proteos_git_install | bool) %} --no-git{% endif %}
      {% if not (proteos_codeserver_install | bool) %} --no-codeserver{% else %}{% if proteos_codeserver_version | length > 0 %} --codeserver-version {{ proteos_codeserver_version }}{% endif %}{% if proteos_codeserver_sha256 | length > 0 %} --codeserver-sha256 {{ proteos_codeserver_sha256 }}{% endif %}{% endif %}
      {% if not (proteos_guest_vim_install | bool) %} --no-vim{% endif %}
      {% if not (proteos_guest_taskfile_install | bool) %} --no-taskfile{% else %}{% if proteos_guest_taskfile_version | length > 0 %} --taskfile-version {{ proteos_guest_taskfile_version }}{% endif %}{% endif %}
      {% if not (proteos_guest_gh_install | bool) %} --no-gh{% else %}{% if proteos_guest_gh_version | length > 0 %} --gh-version {{ proteos_guest_gh_version }}{% endif %}{% if proteos_guest_gh_sha256 | length > 0 %} --gh-sha256 {{ proteos_guest_gh_sha256 }}{% endif %}{% endif %}
      {% for k, v in proteos_guest_aliases.items() %} --alias '{{ k }}={{ v }}'{% endfor %}
  environment:
    PATH: "{{ proteos_go_root }}/bin:{{ ansible_env.PATH }}"
    # Carries the real commit SHA into the image name on the rsync path (the
    # synced tree has no .git). Empty on the git-clone path, where build-rootfs.sh
    # resolves the SHA from the cloned .git itself.
    PROTEOS_ROOTFS_GIT_SHORT: "{{ src_git_short.stdout | default('') | trim }}"
  loop: "{{ proteos_templates }}"
  loop_control:
    label: "{{ item.id }}"
    extended: true
  register: rootfs_bake
  changed_when: rootfs_bake is not skipped and rootfs_bake.rc == 0
  # Rebake this template when the source moved or its manifest is absent. The
  # per-template stat loop above iterates proteos_templates in the same order, so
  # ansible_loop.index0 indexes the matching stat result.
  when: >-
    proteos_src_changed
    or not tmpl_manifests.results[ansible_loop.index0].stat.exists
  notify: restart node-agent

# Read every template's manifest back to learn its baked image name. Each
# manifest-<id>.lock has a line: "image          = proteos-rootfs-<id>-<base>-ga<sha>.ext4".
- name: Read each template's baked rootfs manifest
  tags: [outputs]
  ansible.builtin.slurp:
    src: "{{ proteos_images_dir }}/manifest-{{ item.id }}.lock"
  loop: "{{ proteos_templates }}"
  loop_control:
    label: "{{ item.id }}"
  register: tmpl_manifests_baked

# Map template id → baked image name (the rootfs_ref). The slurp loop above
# preserves proteos_templates order, so ids and parsed images zip 1:1.
- name: Build the template id → image map
  tags: [outputs]
  ansible.builtin.set_fact:
    proteos_template_images: >-
      {{ dict(proteos_templates | map(attribute='id') | list
              | zip(tmpl_manifests_baked.results | map(attribute='content')
                    | map('b64decode')
                    | map('regex_findall', '(?m)^image\s*=\s*(\S+)')
                    | map('first') | list)) }}

# PROTEOS_ROOTFS_REF (node-agent env + the single-image acceptance gates / smoke
# boot below) tracks the PRIMARY template's image.
- name: Pin PROTEOS_ROOTFS_REF to the primary template image
  tags: [outputs]
  ansible.builtin.set_fact:
    proteos_rootfs_ref: "{{ proteos_template_images[proteos_primary_template] }}"

- name: Assert every template image exists
  ansible.builtin.stat:
    path: "{{ proteos_images_dir }}/{{ proteos_template_images[item.id] }}"
  loop: "{{ proteos_templates }}"
  loop_control:
    label: "{{ item.id }}"
  register: baked_template_images
  failed_when: not baked_template_images.stat.exists

# Generate the control-plane catalog (PROTEOS_TEMPLATES_FILE) from the template
# set + baked image names, write it on the host, and fetch it to the controller
# for the app-stack deploy to install. kernel_ref is omitted so the control plane
# fills it from its own PROTEOS_KERNEL_REF (keeps the kernel name on one host).
- name: Render the control-plane template catalog (proteos-templates.json)
  tags: [outputs]
  ansible.builtin.template:
    src: proteos-templates.json.j2
    dest: "{{ proteos_images_dir }}/proteos-templates.json"
    mode: "0644"

- name: Ensure the controller artifacts dir exists
  tags: [outputs]
  ansible.builtin.file:
    path: "{{ proteos_templates_fetch_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  run_once: true

- name: Fetch the template catalog to the controller for the app-stack deploy
  tags: [outputs]
  ansible.builtin.fetch:
    src: "{{ proteos_images_dir }}/proteos-templates.json"
    dest: "{{ proteos_templates_fetch_dir }}/proteos-templates.json"
    flat: true

# Bundle the controlplane resources you'd otherwise SSH in and grep for
# (PROTEOS_ROOTFS_REF + PROTEOS_AGENT_TOKEN + the node's reachable address) into a
# single file on the controller, next to the template catalog. Rendered locally so
# the token never lands on disk anywhere but the controller (0600).
- name: Write the controlplane resource file to the controller
  tags: [outputs]
  ansible.builtin.template:
    src: node-controlplane.env.j2
    dest: "{{ proteos_templates_fetch_dir }}/node-{{ inventory_hostname }}.env"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: Show where the controlplane resources landed
  tags: [outputs]
  ansible.builtin.debug:
    msg:
      - "Node {{ inventory_hostname }} ready. Controlplane resources written to:"
      - "  {{ proteos_templates_fetch_dir }}/node-{{ inventory_hostname }}.env  (PROTEOS_ROOTFS_REF, PROTEOS_AGENT_TOKEN, PROTEOS_NODE_ADDR — secret, 0600)"
      - "  {{ proteos_templates_fetch_dir }}/proteos-templates.json            (PROTEOS_TEMPLATES_FILE)"
      - "PROTEOS_ROOTFS_REF = {{ proteos_rootfs_ref }}"
      - "PROTEOS_NODE_ADDR  = {{ (proteos_tailscale_ip | default(ansible_host, true)) }}:{{ proteos_agent_port }}{{ ' (tailnet)' if proteos_tailscale_ip is defined else '' }}"

# Phase 7 gate: verify the baked image actually contains git + the credential
# helper subcommand and bakes NO token/gitconfig material. Loop-mount only (no VM
# boot), so it is cheap and safe to run on every bake. A red gate aborts the play.
- name: Phase 7 acceptance — git + credential helper present, no secret baked
  tags: [acceptance, git]
  when: proteos_git_install | bool
  ansible.builtin.command:
    cmd: >-
      {{ proteos_src_dir }}/image/verify-phase7-rootfs.sh
      --image {{ proteos_images_dir }}/{{ proteos_rootfs_ref }}
      --images-dir {{ proteos_images_dir }}
  changed_when: false

# Phase 8 gate: verify the baked image contains a runnable code-server + the
# guest agent's web-forward systemd wiring, with NO auth/credential baked.
# Loop-mount only (no VM boot), cheap and safe on every bake. A red gate aborts.
- name: Phase 8 acceptance — code-server present + web forward wired, no secret baked
  tags: [acceptance, codeserver]
  when: proteos_codeserver_install | bool
  ansible.builtin.command:
    cmd: >-
      {{ proteos_src_dir }}/image/verify-phase8-rootfs.sh
      --image {{ proteos_images_dir }}/{{ proteos_rootfs_ref }}
      --images-dir {{ proteos_images_dir }}
  changed_when: false

# ----------------------------------------------------------------------------
# Acceptance gate (Phase 4): prove THIS host can actually boot a jailed microVM
# and complete the encrypted hibernate→resume cycle (its KVM + cryptsetup + the
# pinned kernel + the just-baked rootfs) BEFORE it is allowed to serve. Placed
# ahead of the env/unit/start tasks so a red gate aborts the play and the node is
# never green-lit on broken hardware/config.
#
# It boots real microVMs and allocates from the guest subnet, so it is meant for
# a FRESH node: it auto-skips when the node-agent is already active, to avoid
# IP/tap contention with live machines. Re-run on a live node by stopping the
# service first; disable entirely with proteos_run_acceptance_test=false or
# `--skip-tags acceptance`.
# ----------------------------------------------------------------------------
- name: Acceptance gate — encrypted hibernate/resume on this host
  tags: [acceptance]
  block:
    - name: Check whether the node-agent is already serving
      ansible.builtin.command: systemctl is-active --quiet proteos-node-agent
      register: agent_active
      changed_when: false
      failed_when: false

    # Runs the WHOLE firecracker package, so every acceptance test in it gates the
    # serve — including Phase 9's TestGuestProjectsCwdAndKV (9.6b: a cwd-scoped
    # session + projects.list/kv round-trip). Adding a test file to that package is
    # therefore the only change Phase 9 needs here; no new task/var is required.
    - name: Run the firecracker KVM integration suite (a red gate aborts the play)
      when:
        - proteos_run_acceptance_test | bool
        - agent_active.rc != 0 # skip on a node already serving machines
      ansible.builtin.command:
        cmd: go test -tags firecracker -count=1 -timeout 15m ./internal/driver/firecracker/
        chdir: "{{ proteos_src_dir }}/nodeagent"
      environment:
        PATH: "{{ proteos_go_root }}/bin:/usr/local/sbin:/usr/sbin:/sbin:{{ ansible_env.PATH }}"
        GOWORK: "off"
        PROTEOS_TEST_KERNEL: "{{ proteos_images_dir }}/{{ proteos_kernel_ref }}"
        PROTEOS_TEST_ROOTFS: "{{ proteos_images_dir }}/{{ proteos_rootfs_ref }}"
        PROTEOS_TEST_ROOTFS_HAS_GUEST_AGENT: "1"
        PROTEOS_FIRECRACKER_BIN: "{{ proteos_firecracker_bin }}"
        PROTEOS_JAILER_BIN: "{{ proteos_jailer_bin }}"
        PROTEOS_CRYPTSETUP_BIN: "{{ proteos_cryptsetup_bin }}"
        # The suite replaces the real host's proteos:global nftables rules, so
        # its allowed-interface list must match the deployed agent's (TAV-27).
        PROTEOS_AGENT_MGMT_IFACES: "{{ proteos_agent_mgmt_ifaces }}"
      changed_when: false

# ----------------------------------------------------------------------------
# TAV-27: TLS on the agent channel is mandatory (it carries per-machine LUKS
# volume keys) — the agent refuses to start plaintext on a non-loopback
# listener. When no cert is supplied, generate a self-signed pair on the host
# and fetch the cert to the controller so the app stack pins it
# (PROTEOS_NODE_CA_FILE). SANs cover the tailnet IP (the production dial path),
# the inventory address, and the hostname.
# ----------------------------------------------------------------------------
- name: Resolve effective agent TLS cert/key paths
  ansible.builtin.set_fact:
    proteos_agent_tls_cert_effective: >-
      {{ proteos_agent_tls_cert if proteos_agent_tls_cert | length > 0
         else proteos_agent_tls_dir ~ '/agent.crt' }}
    proteos_agent_tls_key_effective: >-
      {{ proteos_agent_tls_key if proteos_agent_tls_key | length > 0
         else proteos_agent_tls_dir ~ '/agent.key' }}

- name: Generate a self-signed agent TLS cert
  when: proteos_agent_tls_cert | length == 0
  block:
    - name: Ensure the agent TLS dir exists
      ansible.builtin.file:
        path: "{{ proteos_agent_tls_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Generate the agent TLS private key
      community.crypto.openssl_privatekey:
        path: "{{ proteos_agent_tls_key_effective }}"
        type: ECC
        curve: secp256r1
        owner: root
        group: root
        mode: "0600"
      notify: restart node-agent

    - name: Generate the agent TLS CSR (SANs = every address the CP may dial)
      community.crypto.openssl_csr:
        path: "{{ proteos_agent_tls_dir }}/agent.csr"
        privatekey_path: "{{ proteos_agent_tls_key_effective }}"
        common_name: "{{ inventory_hostname }}"
        subject_alt_name: >-
          {{ (['DNS:' ~ inventory_hostname, 'IP:127.0.0.1']
              + (['IP:' ~ proteos_tailscale_ip] if proteos_tailscale_ip is defined else [])
              + (['IP:' ~ ansible_host] if ansible_host is match('^\d+\.\d+\.\d+\.\d+$') else ['DNS:' ~ ansible_host])) }}
        mode: "0644"

    - name: Self-sign the agent TLS cert
      community.crypto.x509_certificate:
        path: "{{ proteos_agent_tls_cert_effective }}"
        csr_path: "{{ proteos_agent_tls_dir }}/agent.csr"
        privatekey_path: "{{ proteos_agent_tls_key_effective }}"
        provider: selfsigned
        selfsigned_not_after: "+3650d"
        owner: root
        group: root
        mode: "0644"
      notify: restart node-agent

- name: Fetch the agent cert to the controller (app stack's PROTEOS_NODE_CA_FILE)
  tags: [outputs]
  ansible.builtin.fetch:
    src: "{{ proteos_agent_tls_cert_effective }}"
    dest: "{{ proteos_templates_fetch_dir }}/node-{{ inventory_hostname }}-agent-ca.pem"
    flat: true

# ----------------------------------------------------------------------------
# Config + systemd unit.
# ----------------------------------------------------------------------------
- name: Render node-agent env file
  ansible.builtin.template:
    src: node-agent.env.j2
    dest: "{{ proteos_env_file }}"
    owner: root
    group: root
    mode: "0600"          # holds the bearer token
  notify: restart node-agent

- name: Install systemd unit
  ansible.builtin.copy:
    src: "{{ proteos_src_dir }}/deploy/node-agent/proteos-node-agent.service"
    dest: /etc/systemd/system/proteos-node-agent.service
    owner: root
    group: root
    mode: "0644"
    remote_src: true
  notify:
    - reload systemd
    - restart node-agent

- name: Enable and start node-agent
  ansible.builtin.systemd:
    name: proteos-node-agent
    enabled: true
    state: started
    daemon_reload: true

# ----------------------------------------------------------------------------
# Optional: lock :9090 to the app VM. Separate nft table so it coexists with the
# agent's own ruleset. Only runs when explicitly enabled.
# ----------------------------------------------------------------------------
- name: Restrict agent port to the app VM
  when: proteos_restrict_agent_port | bool
  block:
    - name: Assert app VM IP is set when restricting the port
      ansible.builtin.assert:
        that:
          - proteos_app_vm_ip | length > 0
        fail_msg: "proteos_restrict_agent_port is true but proteos_app_vm_ip is empty."

    - name: Install agent-port firewall ruleset
      ansible.builtin.template:
        src: proteos-agent-fw.nft.j2
        dest: "{{ proteos_config_dir }}/agent-fw.nft"
        owner: root
        group: root
        mode: "0644"
      notify: reload agent firewall

    # A oneshot unit re-applies the standalone nft table on boot, so the
    # restriction survives reboots without editing the host's nftables.conf.
    - name: Install agent-firewall unit
      ansible.builtin.template:
        src: proteos-agent-fw.service.j2
        dest: /etc/systemd/system/proteos-agent-fw.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload systemd
        - reload agent firewall

    - name: Enable agent-firewall unit
      ansible.builtin.systemd:
        name: proteos-agent-fw
        enabled: true
        daemon_reload: true
