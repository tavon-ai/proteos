---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart node-agent
  ansible.builtin.systemd:
    name: proteos-node-agent
    state: restarted

- name: reload agent firewall
  ansible.builtin.command:
    cmd: "/usr/sbin/nft -f {{ proteos_config_dir }}/agent-fw.nft"
