# Copy to inventory.ini and edit. The "proteos_kvm" group holds the bare KVM
# host(s) — each is a Proxmox VM with nested virt (CPU type `host`) so /dev/kvm
# is present. The node-agent runs natively as root on these; the control-plane
# app-stack lives elsewhere (see deploy/app-stack/).
[proteos_kvm]
proteos-fc-node ansible_host=192.168.2.93

[proteos_kvm:vars]
ansible_user=ivan
# ansible_python_interpreter=/usr/bin/python3
